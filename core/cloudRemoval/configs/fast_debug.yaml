experiment:
  name: debug-48
  output_dir: record/refactor_runs
  seed: 540
  deterministic: true

data:
  root_dir: D:/ceeres/03_Program/01_SYSUM/00_science/04_image_recovery/01_program/00_dataset/chlora_month/rename_input
  mask_dir: D:/ceeres/03_Program/01_SYSUM/00_science/04_image_recovery/01_program/00_dataset/chl_mask
  frames: 4
  image_size: [48, 48]
  stride: 1
  suffix: .npy
  sort_files: true
  use_mmap: true
  mask_sampling: random
  split:
    mode: chronological
    train_ratio: 0.7
    val_ratio: 0.2
  loader:
    num_workers: 0
    pin_memory: true
    persistent_workers: false
    shuffle_train: true
    drop_last: false
  synthetic_mask:
    keep_prob: 0.8
  transform:
    log10: true
    nan_value: 1.0
    zero_value: 1.0
    normalize: none
    eps: 1.0e-6

model:
  input_channels: 1
  output_channels: 1
  frames: 4
  stage_channels: [4, 8, 12]
  hidden_channels: [8, 12, 12]
  kernel_size: 3
  fourier_mode: fft_add
  upsample_mode: bilinear
  alternate_reverse: true
  output_activation: relu

loss:
  pixel_loss: smooth_l1
  pixel_weight: 0.5
  ssim_weight: 0.5
  mask_mode: missing
  temporal_weight: 0.0
  ssim_window: 7
  ssim_val_range: null
  normalize_ssim_loss: true

metrics:
  mask_mode: missing

optimizer:
  lr: 1.0e-3
  weight_decay: 1.0e-4

scheduler:
  name: plateau
  factor: 0.5
  patience: 2
  min_lr: 0.0

training:
  device: auto
  epochs: 2
  batch_size: 1
  amp: true
  compile: false
  validate_every: 1
  save_sample_every: 1
  early_stopping_patience: 5
  early_stopping_min_delta: 0.0
  clip_grad_value: null
  clip_grad_norm: 1.0
  resume: null
